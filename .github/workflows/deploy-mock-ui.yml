name: Deploy Mock UI to Vercel (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      products:
        description: "Products to include (comma-separated: tak,mtx — or 'all')"
        required: false
        default: "all"
      vite_theme:
        description: "Theme to build with"
        required: false
        default: "default"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build mock UI
        uses: ./.github/actions/build-mock-ui
        with:
          products: ${{ inputs.products || 'all' }}
          vite_theme: ${{ inputs.vite_theme || 'default' }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: uiv2

      - name: Build with Vercel (generates .vercel/output)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: uiv2

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: uiv2
